name: Linux Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to attach packages to (for example v0.0.24)"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: Build deb and rpm (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          if [[ ! "$tag" =~ ^v ]]; then
            echo "Release tag must start with v (got: $tag)" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && steps.release_tag.outputs.tag || github.ref }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install --yes rpm

      - name: Apply release package version
        run: node scripts/update-release-package-versions.ts "${{ steps.release_tag.outputs.tag#v }}"

      - name: Build Linux packages
        run: vp run dist:linux

      - name: Inspect packages
        run: |
          dpkg-deb --info release/*.deb
          rpm --query --package --info release/*.rpm

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: morecode-headless-linux-${{ matrix.arch }}
          path: |
            release/*.deb
            release/*.rpm
          if-no-files-found: error

  release:
    name: Upload to GitHub release
    needs: package
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          if [[ ! "$tag" =~ ^v ]]; then
            echo "Release tag must start with v (got: $tag)" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download amd64 packages
        uses: actions/download-artifact@v6
        with:
          name: morecode-headless-linux-amd64
          path: release

      - name: Download arm64 packages
        uses: actions/download-artifact@v6
        with:
          name: morecode-headless-linux-arm64
          path: release

      - name: Upload packages to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          gh release view "$RELEASE_TAG" ||
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          gh release upload "$RELEASE_TAG" release/*.deb release/*.rpm --clobber