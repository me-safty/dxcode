name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Format, Lint, Typecheck, Test, Browser Test, Build
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: false

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Ensure Electron runtime is installed
        run: |
          unset ELECTRON_SKIP_BINARY_DOWNLOAD
          electron_dir="$(dirname "$(node -p "require.resolve('./apps/desktop/node_modules/electron/package.json')")")"
          electron_version="$(node -p "require('./apps/desktop/node_modules/electron/package.json').version")"
          electron_platform="$(node -p "process.platform")"
          electron_arch="$(node -p "process.arch")"
          electron_zip="${RUNNER_TEMP:-/tmp}/electron-v${electron_version}-${electron_platform}-${electron_arch}.zip"
          rm -rf "$electron_dir/dist" "$electron_dir/path.txt"
          curl -fsSL \
            "https://github.com/electron/electron/releases/download/v${electron_version}/electron-v${electron_version}-${electron_platform}-${electron_arch}.zip" \
            -o "$electron_zip"
          python3 - "$electron_zip" "$electron_dir/dist" <<'PY'
          import os
          import sys
          import zipfile

          zip_path, destination = sys.argv[1], sys.argv[2]
          os.makedirs(destination, exist_ok=True)
          with zipfile.ZipFile(zip_path) as archive:
              archive.extractall(destination)
          PY
          node - "$electron_dir" <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const electronDir = process.argv[2];
          const platformPath =
            process.platform === "darwin"
              ? "Electron.app/Contents/MacOS/Electron"
              : process.platform === "win32"
                ? "electron.exe"
                : "electron";
          const electronPath = path.join(electronDir, "dist", platformPath);

          if (!fs.existsSync(electronPath)) {
            throw new Error(`Missing Electron executable at ${electronPath}`);
          }

          fs.chmodSync(electronPath, 0o755);
          fs.writeFileSync(path.join(electronDir, "path.txt"), platformPath);
          NODE
          electron_path="$(node -p "require('./apps/desktop/node_modules/electron')")"
          test -x "$electron_path"

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Test
        run: vp test

      - name: Install browser test runtime
        run: vp run --filter @t3tools/web test:browser:install

      - name: Browser test / Chat view
        working-directory: apps/web
        run: vp test run --config vitest.browser.config.ts src/components/ChatView.browser.tsx

      - name: Browser test / Chat markdown
        working-directory: apps/web
        run: vp test run --config vitest.browser.config.ts src/components/ChatMarkdown.browser.tsx

      - name: Browser test / Components
        working-directory: apps/web
        run: |
          vp test run --config vitest.browser.config.ts \
            src/components/GitActionsControl.browser.tsx \
            src/components/KeybindingsToast.browser.tsx \
            src/components/ThreadTerminalDrawer.browser.tsx \
            src/components/chat/MessagesTimeline.browser.tsx \
            src/components/chat/ProviderModelPicker.browser.tsx \
            src/components/chat/CompactComposerControlsMenu.browser.tsx \
            src/components/settings/SettingsPanels.browser.tsx

      - name: Build desktop pipeline
        run: vp run build:desktop

      - name: Verify preload bundle output
        run: |
          test -f apps/desktop/dist-electron/preload.cjs
          grep -nE "desktopBridge|getLocalEnvironmentBootstrap|PICK_FOLDER_CHANNEL|wsUrl" apps/desktop/dist-electron/preload.cjs

  mobile_native_static_analysis:
    name: Mobile Native Static Analysis
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Install mobile native static analysis tools
        run: brew bundle install --file apps/mobile/Brewfile

      - name: Lint mobile native sources
        run: vp run lint:mobile

  release_smoke:
    name: Release Smoke
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Exercise release-only workflow steps
        run: node scripts/release-smoke.ts
