<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>T3 Code</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #0a0a0a;
        color: #f4f4f5;
        font:
          13px/1.4 ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      #frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: none;
        background: #0a0a0a;
      }

      #status {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        box-sizing: border-box;
        text-align: center;
        color: #a1a1aa;
      }

      #status[data-hidden="true"] {
        display: none;
      }
    </style>
  </head>
  <body>
    <iframe id="frame" title="T3 Code"></iframe>
    <div id="status">Opening T3 Code...</div>
    <script src="sidepanel.js"></script>
  </body>
</html>
