<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#fdf6e3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#002b36" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#002b36" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (() => {
        const SCHEME_BG = {
          default: ["#ffffff", "#161616"],
          solarized: ["#fdf6e3", "#002b36"],
          dracula: ["#fffbeb", "#282a36"],
          gruvbox: ["#fbf1c7", "#282828"],
          catppuccin: ["#eff1f5", "#1e1e2e"],
          "tokyo-night": ["#e1e2e7", "#1a1b26"],
        };
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        try {
          const storedTheme = window.localStorage.getItem("t3code:theme");
          const theme =
            storedTheme === "light" || storedTheme === "dark" || storedTheme === "system"
              ? storedTheme
              : "system";
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const isDark = theme === "dark" || (theme === "system" && prefersDark);
          document.documentElement.classList.toggle("dark", isDark);
          const storedScheme = window.localStorage.getItem("t3code:colorScheme");
          if (storedScheme && SCHEME_BG[storedScheme]) {
            document.documentElement.dataset.scheme = storedScheme;
          }
          const colors = SCHEME_BG[storedScheme] || SCHEME_BG.default;
          const chromeColor = isDark ? colors[1] : colors[0];
          document.documentElement.style.backgroundColor = chromeColor;
          themeColorMeta?.setAttribute("content", chromeColor);
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.backgroundColor = SCHEME_BG.default[1];
          themeColorMeta?.setAttribute("content", SCHEME_BG.default[1]);
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background-color: inherit;
        color: #262626;
        font-family:
          "DM Sans Variable",
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      html.dark body {
        color: #f5f5f5;
      }

      #boot-shell {
        display: flex;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        background: inherit;
      }

      #boot-shell-card {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
      }

      #boot-shell-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }
    </style>
    <title>T3 Code (Alpha)</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-shell">
        <div id="boot-shell-card" aria-label="T3 Code splash screen">
          <img id="boot-shell-logo" src="/apple-touch-icon.png" alt="T3 Code" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
